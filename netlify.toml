[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXTAUTH_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,NEXTAUTH_SECRET,RESEND_API_KEY"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Accept-Ranges = "bytes"
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=31536000, immutable"
